estimators:
  model_A:
    model: mock_transformer
    datamodule: padded
    dataset: fair_universe
    dataset_override:
      labels_columns: ["PRI_lep_eta"]
    trainer: default
    expands:
      systematics:
        up_qcd:
          dataset: fair_universe_local
          dataset_override:
            labels_columns: ['PRI_n_jets']
      ensembles:
        num_ensembles: 2
        aggregation_method: "mean"
      folds: 2
  model_B:
    model: mock_transformer
    datamodule: padded
    dataset: fair_universe
    trainer: default
    requires: ["model_A"]
    expands:
      ensembles:
        num_ensembles: 1
        aggregation_method: "max"
